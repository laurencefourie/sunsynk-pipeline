name: poll

on:
  schedule:
    # Offset from :00/:05/:10/... to dodge top-of-hour Actions congestion
    # (GitHub silently skips scheduled runs during peak load).
    - cron: "2-59/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run sunsynk pull --write
        env:
          SUNSYNK_USERNAME: ${{ secrets.SUNSYNK_USERNAME }}
          SUNSYNK_PASSWORD: ${{ secrets.SUNSYNK_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
