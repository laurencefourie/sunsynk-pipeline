name: poll

on:
  schedule:
    # Every 15 min offset to :02/:17/:32/:47. Free-tier GitHub Actions
    # throttles 5-min cron heavily; 15 min is the sweet spot for reliable
    # scheduled runs without losing analytical resolution.
    - cron: "2,17,32,47 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - run: uv sync --frozen

      - run: uv run sunsynk pull --write
        env:
          SUNSYNK_USERNAME: ${{ secrets.SUNSYNK_USERNAME }}
          SUNSYNK_PASSWORD: ${{ secrets.SUNSYNK_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
